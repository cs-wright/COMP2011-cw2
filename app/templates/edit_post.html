{% extends "base.html" %}

{% block content %}
  <h1>Edit Post</h1>

  <form method="post" name="status">
    {{ form.hidden_tag() }}
    <div class="panel panel-default">
      <div class="panel-body">
        <p>Edit your post below:</p>
        {{ form.txt(class_='form-control') }}
        {% for error in form.txt.errors %}
        <div class="alert alert-danger" role="alert">
          [{{ error }}]
        </div>
        {% endfor %}
      </div>
    </div>
    <button type="submit" class="btn btn-primary" value="status">Update Post!</button>
</form>


{% endblock %}
