{% extends "base.html" %}
{% block content %}

<h1>Following</h1>
<table class="table">
    <thead>
      <tr>
        <th>Username</th>
        <th>Name</th>
        <th>Gender</th>
        <th>Date of birth</th>
        <th></th>
      </tr>
    </thead>
    <tbody>


    {% for user in users %}
    <tr>
      <td>{{user.username}}</td>
      <td>{{user.name}}</td>
      <td>{{user.gender}}</td>
      <td>{{user.dob}}</td>
      <td><a href="/unfollow/{{user.id}}"><button type="button" class="btn btn-primary">Unfollow!</button></a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>


{% endblock %}
