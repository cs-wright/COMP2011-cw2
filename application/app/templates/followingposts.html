{% extends "base.html" %}
{% block content %}

<h1>Following users posts</h1>
<table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>User</th>
        <th>Post</th>
      </tr>
    </thead>
    <tbody>


    {% for post in posts %}
    <tr>
      <td>{{post.date}}</td>
      <td>{{post.author_id}}</td>
      <td>{{post.content}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>


{% endblock %}
